<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PropValue - 재개발/재건축 정비구역 지도</title>
    <meta name="description" content="수도권 재개발/재건축 정비구역 현황을 지도에서 한눈에. PropValue">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;font-family:'Noto Sans KR',-apple-system,sans-serif;overflow:hidden;background:#f8fafc}
        .app{display:flex;width:100%;height:100%;position:relative}
        .map-area{flex:1;height:100%;position:relative}
        #map{width:100%;height:100%}

        /* 사이드패널 */
        .side-panel{width:380px;height:100%;background:white;border-left:1px solid #e2e8f0;display:flex;flex-direction:column;z-index:10;flex-shrink:0;overflow:hidden}
        .panel-header{padding:10px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
        .panel-title{font-size:15px;font-weight:700;color:#0f172a}
        .panel-subtitle{font-size:10px;color:#94a3b8;margin-top:1px}
        .panel-close{display:none;width:28px;height:28px;border:none;background:#f1f5f9;border-radius:6px;cursor:pointer;font-size:16px;color:#64748b;align-items:center;justify-content:center}

        /* 검색+필터 */
        .filter-area{padding:8px 12px;border-bottom:1px solid #f1f5f9}
        .filter-row{display:flex;gap:5px;margin-bottom:5px;flex-wrap:wrap}
        .filter-row:last-child{margin-bottom:0}
        .filter-section-label{font-size:9px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
        .filter-select{flex:1;min-width:80px;padding:5px 6px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:white;color:#334155;font-family:inherit}
        .filter-btn{padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s;position:relative;white-space:nowrap}
        .filter-btn:hover{opacity:.85}
        .filter-btn .cnt{font-size:8px;opacity:.8;margin-left:2px}
        /* 종류 버튼: filled style */
        .filter-btn.type-btn{border:1px solid transparent}
        .filter-btn.type-btn.active{color:white}
        .filter-btn.type-btn:not(.active){background:#f8fafc;color:#94a3b8;border-color:#e2e8f0}
        /* 단계 버튼: outlined style */
        .filter-btn.stage-btn{background:transparent;border:3px solid #e2e8f0}
        .filter-btn.stage-btn.active{background:transparent}
        .filter-btn.stage-btn:not(.active){border-color:#e2e8f0;color:#cbd5e1}
        .search-input{width:100%;padding:6px 8px 6px 28px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:white;color:#334155;font-family:inherit}
        .search-wrap{position:relative}
        .search-icon{position:absolute;left:7px;top:50%;transform:translateY(-50%);font-size:15px;color:#94a3b8}

        /* 상세패널 */
        .detail-panel{display:none;padding:12px;border-bottom:1px solid #e2e8f0;background:#f0f9ff;flex-shrink:0}
        .detail-panel.show{display:block}
        .detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .detail-title{font-size:13px;font-weight:700;color:#0f172a}
        .detail-close{border:none;background:none;cursor:pointer;color:#94a3b8;font-size:18px;padding:0}
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px}
        .detail-label{font-size:9px;color:#94a3b8;margin-bottom:1px}
        .detail-value{font-size:11px;font-weight:500;color:#334155}

        /* 통계 바 */
        .stats-bar{padding:6px 12px;background:#f8fafc;border-bottom:1px solid #f1f5f9;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
        .stat-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#e2e8f0;color:#475569}
        .stat-chip .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .stat-chip.removable{cursor:pointer;background:#3b82f6;color:white}

        /* 구역 목록 */
        .zone-list{flex:1;overflow-y:auto;padding:6px 10px}
        .zone-card{padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:5px;cursor:pointer;transition:all .15s}
        .zone-card:hover{border-color:#93c5fd;background:#f0f9ff}
        .zone-card.selected{border-color:#3b82f6;background:#eff6ff;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
        .zone-name{font-size:12px;font-weight:600;color:#0f172a;margin-bottom:3px}
        .zone-meta{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
        .zone-badge{display:inline-flex;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600}
        .zone-address{font-size:10px;color:#64748b;margin-top:2px}

        /* 범례 */
        .legend-toggle{position:absolute;bottom:20px;left:12px;z-index:5;padding:6px 10px;background:white;border:1px solid #e2e8f0;border-radius:8px;font-size:11px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);font-family:inherit}
        .legend-panel{display:none;position:absolute;bottom:50px;left:12px;z-index:5;background:white;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:200px;max-height:70vh;overflow-y:auto}
        .legend-panel.show{display:block}
        .legend-title{font-size:11px;font-weight:700;color:#0f172a;margin-bottom:6px}
        .legend-section{margin-bottom:8px}
        .legend-section-title{font-size:9px;font-weight:700;color:#94a3b8;margin-bottom:4px}
        .legend-item{display:flex;align-items:center;gap:6px;margin-bottom:3px}
        .legend-color{width:14px;height:10px;border-radius:2px;border:1px solid rgba(0,0,0,.1)}
        .legend-color.stroke-style{background:transparent !important;border-width:2px}
        .legend-label{font-size:10px;color:#475569}

        /* 패널 토글 */
        .panel-toggle-btn{position:absolute;top:50%;right:380px;transform:translateY(-50%);z-index:11;width:18px;height:44px;background:white;border:1px solid #e2e8f0;border-right:none;border-radius:6px 0 0 6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#94a3b8;transition:right .3s}
        .panel-toggle-btn.collapsed{right:0}

        /* 로딩 */
        .loading-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;z-index:20}
        .loading-overlay.hidden{display:none}
        .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* 모바일 */
        @media(max-width:768px){
            .side-panel{position:fixed;bottom:0;left:0;right:0;width:100%;height:60vh;border-left:none;border-top:2px solid #e2e8f0;border-radius:14px 14px 0 0;transform:translateY(calc(100% - 48px));transition:transform .3s ease}
            .side-panel.expanded{transform:translateY(0)}
            .panel-close{display:flex}
            .panel-toggle-btn{display:none}
            .side-panel::before{content:'';display:block;width:32px;height:4px;background:#cbd5e1;border-radius:2px;margin:6px auto}
            .filter-row{gap:3px}
            .filter-btn{padding:3px 6px;font-size:9px}
        }

        /* 종류별 뱃지 색상 */
        .type-재건축{background:#fce7f3;color:#9d174d}
        .type-재개발\(주택정비형\){background:#dbeafe;color:#1e40af}
        .type-재개발\(도시정비형\){background:#e0e7ff;color:#3730a3}
        .type-가로주택정비{background:#d1fae5;color:#065f46}
        .type-소규모재건축{background:#fae8ff;color:#86198f}
        .type-도시재생{background:#fef3c7;color:#92400e}
        .type-지구단위계획{background:#f1f5f9;color:#475569}
        .type-재정비촉진{background:#ffedd5;color:#9a3412}
        .type-역세권{background:#cffafe;color:#155e75}
        .type-도시개발{background:#f5f3ff;color:#5b21b6}
        .type-기타{background:#f1f5f9;color:#64748b}

        /* 단계별 뱃지 색상 (outline style - 테두리로 단계 표현) */
        .stage-초기{background:transparent;color:#22C55E;border:2.5px solid #22C55E}
        .stage-조합{background:transparent;color:#3B82F6;border:2.5px solid #3B82F6}
        .stage-사시{background:transparent;color:#F59E0B;border:2.5px solid #F59E0B}
        .stage-관처{background:transparent;color:#EF4444;border:2.5px solid #EF4444}
        .stage-공사{background:transparent;color:#8B5CF6;border:2.5px solid #8B5CF6}
        .stage-완료{background:transparent;color:#1E293B;border:2.5px solid #1E293B}
        .stage-미확인{background:transparent;color:#94a3b8;border:2.5px dashed #94a3b8}
    </style>
</head>
<body>
    <div class="app">
        <div class="map-area">
            <div id="map"></div>
            <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
            <div style="position:absolute;bottom:60px;left:12px;z-index:5;display:flex;flex-direction:column;gap:2px">
                <button onclick="goMyLocation()" title="내 위치" style="width:32px;height:32px;border:1px solid #e2e8f0;background:white;border-radius:6px;font-size:16px;cursor:pointer;color:#3b82f6;box-shadow:0 2px 6px rgba(0,0,0,.1);margin-bottom:4px">&#9678;</button>
                <button onclick="map.setLevel(map.getLevel()-1)" style="width:32px;height:32px;border:1px solid #e2e8f0;background:white;border-radius:6px 6px 0 0;font-size:18px;cursor:pointer;font-weight:700;color:#334155;box-shadow:0 2px 6px rgba(0,0,0,.1)">+</button>
                <button onclick="map.setLevel(map.getLevel()+1)" style="width:32px;height:32px;border:1px solid #e2e8f0;background:white;border-radius:0 0 6px 6px;font-size:18px;cursor:pointer;font-weight:700;color:#334155;box-shadow:0 2px 6px rgba(0,0,0,.1)">-</button>
            </div>
            <button class="legend-toggle" onclick="toggleLegend()">범례</button>
            <div class="legend-panel" id="legendPanel">
                <div class="legend-title">종류 (채움색)</div>
                <div class="legend-section" id="legendTypes"></div>
                <div class="legend-title" style="margin-top:8px">단계 (테두리)</div>
                <div class="legend-section" id="legendStages"></div>
            </div>
        </div>
        <button class="panel-toggle-btn" id="panelToggle" onclick="togglePanel()">&#9654;</button>
        <div class="side-panel" id="sidePanel">
            <div class="panel-header">
                <div><div class="panel-title">PropValue</div><div class="panel-subtitle">재개발/재건축 정비구역 지도</div></div>
                <button class="panel-close" onclick="closeMobilePanel()"><span class="material-symbols-outlined" style="font-size:18px">close</span></button>
            </div>
            <div class="filter-area">
                <div class="filter-row">
                    <div class="search-wrap" style="flex:1">
                        <span class="material-symbols-outlined search-icon">search</span>
                        <input type="text" class="search-input" id="searchInput" placeholder="구역명 검색..." oninput="onSearchInput()">
                    </div>
                    <select class="filter-select" id="filterDistrict" style="flex:0 0 90px" onchange="applyFilters()"><option value="">전체 구/군</option></select>
                </div>
                <div class="filter-section-label">종류</div>
                <div class="filter-row" id="typeFilters"></div>
                <div class="filter-section-label" style="margin-top:4px">단계</div>
                <div class="filter-row" id="stageFilters"></div>
            </div>
            <div class="stats-bar" id="statsBar"></div>
            <div class="detail-panel" id="detailPanel">
                <div class="detail-header">
                    <div class="detail-title" id="detailTitle"></div>
                    <button class="detail-close" onclick="closeDetail()"><span class="material-symbols-outlined" style="font-size:18px">close</span></button>
                </div>
                <div class="detail-grid" id="detailGrid"></div>
            </div>
            <div class="zone-list" id="zoneList"></div>
        </div>
    </div>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1a41388ca117958d172c6ba8e71c7c75&autoload=false"></script>
    <script>
    // === 종류(project_type) 색상 체계 ===
    const TYPE_COLORS = {
        '재건축':           '#EC4899', // pink
        '재개발(주택정비형)':'#3B82F6', // blue
        '재개발(도시정비형)':'#6366F1', // indigo
        '가로주택정비':     '#10B981', // emerald
        '소규모재건축':     '#A855F7', // purple
        '도시재생':         '#F59E0B', // amber
        '지구단위계획':     '#64748B', // slate
        '재정비촉진':       '#F97316', // orange
        '역세권':           '#06B6D4', // cyan
        '도시개발':         '#8B5CF6', // violet
        '택지개발':         '#78716C', // stone
        '도시계획시설':     '#6B7280', // gray
        '시가지조성':       '#737373', // neutral
    };
    const TYPE_FALLBACK_COLOR = '#94a3b8';

    // 종류 필터 버튼 목록 (주요 종류만 버튼, 나머지는 "기타"로 묶음)
    const TYPE_FILTER_LIST = [
        { key: '재건축', label: '재건축' },
        { key: '재개발(주택정비형)', label: '주택정비' },
        { key: '재개발(도시정비형)', label: '도시정비' },
        { key: '가로주택정비', label: '가로주택' },
        { key: '소규모재건축', label: '소규모' },
        { key: '도시재생', label: '도시재생' },
        { key: '지구단위계획', label: '지구단위' },
        { key: '재정비촉진', label: '재정비' },
        { key: '역세권', label: '역세권' },
        { key: '_etc', label: '기타' }, // 위에 없는 나머지 종류 모두
    ];

    // "기타"에 포함될 종류 (위에 명시되지 않은 모든 project_type)
    const MAIN_TYPES = new Set(TYPE_FILTER_LIST.filter(t => t.key !== '_etc').map(t => t.key));

    function getTypeColor(projectType) {
        return TYPE_COLORS[projectType] || TYPE_FALLBACK_COLOR;
    }

    // === 단계(stage) 색상 체계 (테두리색 — 연한→진한 진행도 표현) ===
    const STAGE_COLORS = {
        '초기': '#22C55E',   // green — 초기 단계 (구역지정)
        '조합': '#3B82F6',   // blue — 조합설립
        '사시': '#F59E0B',   // amber — 사업시행인가
        '관처': '#EF4444',   // red — 관리처분
        '공사': '#8B5CF6',   // purple — 착공/시공
        '완료': '#1E293B',   // dark — 준공/완료
        '미확인': '#94a3b8', // gray — 미확인
    };

    // 단계별 테두리 두께 (초기=얇게 → 후기=두껍게)
    const STAGE_STROKE_WEIGHT = {
        '초기': 1.5,
        '조합': 2,
        '사시': 2.5,
        '관처': 3,
        '공사': 3.5,
        '완료': 3,
        '미확인': 1.5,
    };

    const STAGE_FILTER_LIST = [
        { key: '초기', label: '초기', tooltip: '추진위/안전진단/구역지정' },
        { key: '조합', label: '조합', tooltip: '조합설립인가/시행자지정' },
        { key: '사시', label: '사시', tooltip: '사업시행인가' },
        { key: '관처', label: '관처', tooltip: '관리처분계획인가' },
        { key: '공사', label: '공사', tooltip: '착공/철거/분양' },
        { key: '완료', label: '완료', tooltip: '준공/이전고시/해산' },
        { key: '미확인', label: '미확인', tooltip: '단계 정보 없음' },
    ];

    // 세부 단계 → 카테고리 매핑
    const CAT_STAGES = {
        '초기': ['추진위전','추진위','추진위구성','추진위원회승인','추진위원회구성','추진위승인',
                 '안전진단','안전진단(1차)','정비계획 수립','도시계획심의','심의',
                 '구역지정','정비구역지정','구의지정','용역착수','주민공람',
                 '조합창립총회','조합규약작성','조합원 모집신고',
                 '후보지선정','후보지','신속통합기획','신통착수','신통 착수','신통통보',
                 '정비예정','재정비촉진','통심완료'],
        '조합': ['조합설립','조합설립인가','사업시행자지정',
                 '시행자지정(조합)','시행자지정(신탁)','신탁시행자지정(신탁)'],
        '사시': ['사업시행','사업시행인가','사업계획승인','인가 완료'],
        '관처': ['관리처분','관리처분인가','관리처분계획인가','지구단위계획수립/건축심의/교통심의'],
        '공사': ['착공','철거','분양'],
        '완료': ['준공','준공인가','이전고시','조합해산','조합청산'],
    };

    const STAGE_TO_CAT = {};
    Object.entries(CAT_STAGES).forEach(([cat, stages]) => {
        stages.forEach(s => { STAGE_TO_CAT[s] = cat; });
    });

    function stageCategory(stage) {
        if (!stage) return '미확인';
        return STAGE_TO_CAT[stage] || '미확인';
    }

    // === 상태 ===
    let map, allZones = [], filteredZones = [], markers = [], polygons = [], selectedZone = null;
    let activeTypes = new Set(TYPE_FILTER_LIST.map(t => t.key)); // 모든 종류 활성
    let activeStages = new Set(STAGE_FILTER_LIST.map(s => s.key)); // 모든 단계 활성
    let debounceTimer = null;
    let lastZoomMode = null;
    const ZOOM_THRESHOLD = 6;

    // === 뷰포트 기반 렌더링 상태 ===
    const geometryCache = new Map();   // zone.id → geometry (GeoJSON)
    let geoFetchTimer = null;          // geometry 디바운스 타이머
    let lastGeoBounds = null;          // 마지막 geometry 요청 bounds
    let geoFetchAbort = null;          // AbortController for geometry fetch
    const GEO_DEBOUNCE_MS = 300;
    const POLY_ZOOM_THRESHOLD = 7;     // 이 줌 레벨 이하에서만 폴리곤 표시 (값이 클수록 더 줌아웃)

    // === 초기화 ===
    kakao.maps.load(function() {
        map = new kakao.maps.Map(document.getElementById('map'), {
            center: new kakao.maps.LatLng(37.5665, 126.9780), level: 8
        });
        kakao.maps.event.addListener(map, 'idle', onMapIdle);
        buildTypeFilters();
        buildStageFilters();
        buildLegend();
        loadZonesMinimal(); // 경량 초기 로드 (geometry 제외)
    });

    // === 종류 필터 빌드 ===
    function buildTypeFilters() {
        const container = document.getElementById('typeFilters');
        TYPE_FILTER_LIST.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn type-btn active';
            btn.id = 'type-btn-' + t.key;
            btn.dataset.type = t.key;
            const color = t.key === '_etc' ? TYPE_FALLBACK_COLOR : (TYPE_COLORS[t.key] || TYPE_FALLBACK_COLOR);
            btn.innerHTML = `${t.label}<span class="cnt" id="type-cnt-${t.key}"></span>`;
            btn.style.background = color;
            btn.style.color = 'white';
            btn.style.borderColor = color;
            btn.onclick = function(e) {
                e.stopPropagation();
                if (activeTypes.has(t.key)) {
                    activeTypes.delete(t.key);
                    btn.classList.remove('active');
                    btn.style.background = '#f8fafc';
                    btn.style.color = '#94a3b8';
                    btn.style.borderColor = '#e2e8f0';
                } else {
                    activeTypes.add(t.key);
                    btn.classList.add('active');
                    btn.style.background = color;
                    btn.style.color = 'white';
                    btn.style.borderColor = color;
                }
                applyFilters();
            };
            // 더블클릭: solo (이것만 선택)
            btn.ondblclick = function(e) {
                e.stopPropagation();
                const wasOnly = activeTypes.size === 1 && activeTypes.has(t.key);
                if (wasOnly) {
                    TYPE_FILTER_LIST.forEach(tt => activeTypes.add(tt.key));
                } else {
                    activeTypes.clear();
                    activeTypes.add(t.key);
                }
                updateTypeButtonStyles();
                applyFilters();
            };
            container.appendChild(btn);
        });
    }

    function updateTypeButtonStyles() {
        TYPE_FILTER_LIST.forEach(t => {
            const btn = document.getElementById('type-btn-' + t.key);
            if (!btn) return;
            const color = t.key === '_etc' ? TYPE_FALLBACK_COLOR : (TYPE_COLORS[t.key] || TYPE_FALLBACK_COLOR);
            if (activeTypes.has(t.key)) {
                btn.classList.add('active');
                btn.style.background = color;
                btn.style.color = 'white';
                btn.style.borderColor = color;
            } else {
                btn.classList.remove('active');
                btn.style.background = '#f8fafc';
                btn.style.color = '#94a3b8';
                btn.style.borderColor = '#e2e8f0';
            }
        });
    }

    // === 단계 필터 빌드 ===
    function buildStageFilters() {
        const container = document.getElementById('stageFilters');
        STAGE_FILTER_LIST.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn stage-btn active';
            btn.id = 'stage-btn-' + s.key;
            btn.dataset.stage = s.key;
            const color = STAGE_COLORS[s.key];
            const isDashed = s.key === '미확인';
            btn.innerHTML = `${s.label}<span class="cnt" id="stage-cnt-${s.key}"></span>`;
            // Outlined style: transparent bg, colored border + text
            btn.style.background = 'transparent';
            btn.style.color = color;
            btn.style.borderColor = color;
            btn.style.borderWidth = '3px';
            if (isDashed) btn.style.borderStyle = 'dashed';
            btn.title = s.tooltip;
            btn.onclick = function(e) {
                e.stopPropagation();
                if (activeStages.has(s.key)) {
                    activeStages.delete(s.key);
                    btn.classList.remove('active');
                    btn.style.borderColor = '#e2e8f0';
                    btn.style.color = '#cbd5e1';
                } else {
                    activeStages.add(s.key);
                    btn.classList.add('active');
                    btn.style.borderColor = color;
                    btn.style.color = color;
                }
                applyFilters();
            };
            // 더블클릭: solo
            btn.ondblclick = function(e) {
                e.stopPropagation();
                const wasOnly = activeStages.size === 1 && activeStages.has(s.key);
                if (wasOnly) {
                    STAGE_FILTER_LIST.forEach(ss => activeStages.add(ss.key));
                } else {
                    activeStages.clear();
                    activeStages.add(s.key);
                }
                updateStageButtonStyles();
                applyFilters();
            };
            container.appendChild(btn);
        });
    }

    function updateStageButtonStyles() {
        STAGE_FILTER_LIST.forEach(s => {
            const btn = document.getElementById('stage-btn-' + s.key);
            if (!btn) return;
            const color = STAGE_COLORS[s.key];
            if (activeStages.has(s.key)) {
                btn.classList.add('active');
                btn.style.background = 'transparent';
                btn.style.borderColor = color;
                btn.style.color = color;
            } else {
                btn.classList.remove('active');
                btn.style.background = 'transparent';
                btn.style.borderColor = '#e2e8f0';
                btn.style.color = '#cbd5e1';
            }
        });
    }

    // === 범례 빌드 ===
    function buildLegend() {
        const typesEl = document.getElementById('legendTypes');
        const stagesEl = document.getElementById('legendStages');
        // 종류: 채움 사각형 (폴리곤 fill과 동일)
        TYPE_FILTER_LIST.forEach(t => {
            if (t.key === '_etc') return;
            const color = TYPE_COLORS[t.key] || TYPE_FALLBACK_COLOR;
            typesEl.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${color};opacity:.35;border-color:${color}"></div><span class="legend-label">${t.key}</span></div>`;
        });
        typesEl.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${TYPE_FALLBACK_COLOR};opacity:.35"></div><span class="legend-label">기타 (도시개발/택지 등)</span></div>`;
        // 단계: 테두리 사각형 (폴리곤 stroke와 동일)
        STAGE_FILTER_LIST.forEach(s => {
            const color = STAGE_COLORS[s.key];
            const weight = STAGE_STROKE_WEIGHT[s.key] || 2;
            const borderStyle = s.key === '미확인' ? 'dashed' : 'solid';
            stagesEl.innerHTML += `<div class="legend-item"><div class="legend-color stroke-style" style="border-color:${color};border-width:${Math.min(weight, 3)}px;border-style:${borderStyle}"></div><span class="legend-label">${s.label} - ${s.tooltip}</span></div>`;
        });
    }

    // === 데이터 로딩 (경량: geometry 제외) ===
    async function loadZonesMinimal() {
        try {
            const resp = await fetch('/api/propvalue/zones?fields=minimal');
            const data = await resp.json();
            if (data.success) {
                allZones = data.zones;
                populateDistrictFilter();
                updateFilterCounts();
                applyFilters();
            }
        } catch(e) { console.error('loadZonesMinimal:', e); }
        finally { document.getElementById('loadingOverlay').classList.add('hidden'); }
    }

    // === 뷰포트 내 geometry 로딩 ===
    function getMapBoundsString() {
        const b = map.getBounds();
        const sw = b.getSouthWest();
        const ne = b.getNorthEast();
        return `${sw.getLat()},${sw.getLng()},${ne.getLat()},${ne.getLng()}`;
    }

    function scheduleGeometryFetch() {
        clearTimeout(geoFetchTimer);
        const level = map.getLevel();
        // 줌이 너무 넓으면 폴리곤 불필요
        if (level > POLY_ZOOM_THRESHOLD) {
            // 폴리곤 제거
            polygons.forEach(p => p.setMap(null));
            polygons = [];
            return;
        }
        geoFetchTimer = setTimeout(fetchViewportGeometry, GEO_DEBOUNCE_MS);
    }

    async function fetchViewportGeometry() {
        const boundsStr = getMapBoundsString();
        const level = map.getLevel();
        if (level > POLY_ZOOM_THRESHOLD) return;

        // 이전 요청 취소
        if (geoFetchAbort) geoFetchAbort.abort();
        geoFetchAbort = new AbortController();

        // 현재 뷰포트에 보이는 filteredZones 중 geometry 미캐시된 것 확인
        const b = map.getBounds();
        const sw = b.getSouthWest();
        const ne = b.getNorthEast();
        const visibleIds = filteredZones.filter(z => {
            if (!z.center_lat || !z.center_lon) return false;
            return z.center_lat >= sw.getLat() && z.center_lat <= ne.getLat()
                && z.center_lon >= sw.getLng() && z.center_lon <= ne.getLng();
        }).map(z => z.id);

        const uncachedIds = visibleIds.filter(id => !geometryCache.has(id));

        // 모든 geometry가 이미 캐시되어 있으면 렌더링만
        if (uncachedIds.length === 0) {
            renderPolygons();
            return;
        }

        // bounds 기반으로 geometry 요청 (simplify 여부는 줌 레벨에 따라)
        const simplify = level > 4 ? '&simplify=true' : '';
        try {
            const resp = await fetch(
                `/api/propvalue/zones?include_geometry=true&bounds=${boundsStr}${simplify}`,
                { signal: geoFetchAbort.signal }
            );
            const data = await resp.json();
            if (data.success) {
                data.zones.forEach(z => {
                    if (z.geometry) {
                        geometryCache.set(z.id, z.geometry);
                    }
                });
                renderPolygons();
            }
        } catch(e) {
            if (e.name !== 'AbortError') console.error('fetchViewportGeometry:', e);
        }
    }

    function populateDistrictFilter() {
        const sel = document.getElementById('filterDistrict');
        [...new Set(allZones.map(z => z.district).filter(Boolean))].sort().forEach(d => {
            const o = document.createElement('option'); o.value = d; o.textContent = d; sel.appendChild(o);
        });
    }

    // === 필터 건수 업데이트 ===
    function updateFilterCounts() {
        const typeCounts = {};
        const stageCounts = {};
        TYPE_FILTER_LIST.forEach(t => typeCounts[t.key] = 0);
        STAGE_FILTER_LIST.forEach(s => stageCounts[s.key] = 0);

        allZones.forEach(z => {
            // 종류 카운트
            const pt = z.project_type || '';
            if (MAIN_TYPES.has(pt)) {
                typeCounts[pt] = (typeCounts[pt] || 0) + 1;
            } else {
                typeCounts['_etc'] = (typeCounts['_etc'] || 0) + 1;
            }
            // 단계 카운트
            const sc = stageCategory(z.stage);
            stageCounts[sc] = (stageCounts[sc] || 0) + 1;
        });

        TYPE_FILTER_LIST.forEach(t => {
            const el = document.getElementById('type-cnt-' + t.key);
            if (el) el.textContent = typeCounts[t.key] > 0 ? typeCounts[t.key] : '';
        });
        STAGE_FILTER_LIST.forEach(s => {
            const el = document.getElementById('stage-cnt-' + s.key);
            if (el) el.textContent = stageCounts[s.key] > 0 ? stageCounts[s.key] : '';
        });
    }

    // === 필터 적용 ===
    function zoneMatchesTypeFilter(z) {
        const pt = z.project_type || '';
        if (MAIN_TYPES.has(pt)) {
            return activeTypes.has(pt);
        } else {
            return activeTypes.has('_etc');
        }
    }

    function applyFilters() {
        const dist = document.getElementById('filterDistrict').value;
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        const tenYearsAgo = new Date();
        tenYearsAgo.setFullYear(tenYearsAgo.getFullYear() - 10);

        filteredZones = allZones.filter(z => {
            if (dist && z.district !== dist) return false;
            if (!zoneMatchesTypeFilter(z)) return false;
            if (!activeStages.has(stageCategory(z.stage))) return false;
            if (q && !z.zone_name.toLowerCase().includes(q)) return false;
            // 준공 10년 이상 지난 구역 제외
            if (z.completion_date && new Date(z.completion_date) < tenYearsAgo) return false;
            return true;
        });
        lastZoomMode = null;
        renderMarkers(true);
        renderZoneList();
        renderStatsBar();
        // 폴리곤은 뷰포트 기반으로 로드
        scheduleGeometryFetch();
    }

    // === 통계 바 ===
    function renderStatsBar() {
        const bar = document.getElementById('statsBar');
        bar.innerHTML = `<span class="stat-chip"><strong>${filteredZones.length.toLocaleString()}</strong>&nbsp;/ ${allZones.length.toLocaleString()} 구역</span>`;
    }

    // === 검색 ===
    function onSearchInput() { clearTimeout(debounceTimer); debounceTimer = setTimeout(applyFilters, 200); }
    function getZoomMode() { return map.getLevel() <= ZOOM_THRESHOLD ? 'label' : 'dot'; }

    // === 마커 렌더링 (종류 기반 색상) ===
    function renderMarkers(forceRedraw) {
        const mode = getZoomMode();
        if (!forceRedraw && mode === lastZoomMode && markers.length > 0) return;
        lastZoomMode = mode;
        markers.forEach(m => m.setMap(null)); markers = [];

        filteredZones.forEach(z => {
            if (!z.center_lat || !z.center_lon) return;
            const color = getTypeColor(z.project_type);
            const pos = new kakao.maps.LatLng(z.center_lat, z.center_lon);
            const el = document.createElement('div');

            if (mode === 'dot') {
                // 줌아웃: 종류별 채움색 + 단계별 테두리색
                const sc = stageCategory(z.stage);
                const stColor = STAGE_COLORS[sc] || STAGE_COLORS['미확인'];
                const borderStyle = sc === '미확인' ? `1.5px dashed ${stColor}` : `2px solid ${stColor}`;
                el.style.cssText = `width:8px;height:8px;border-radius:50%;background:${color};border:${borderStyle};box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:pointer`;
                el.onclick = () => { map.setLevel(5); map.setCenter(pos); };
            } else {
                // 줌인: 종류별 배경색 + 단계별 테두리색 라벨
                const sc = stageCategory(z.stage);
                const stColor = STAGE_COLORS[sc] || STAGE_COLORS['미확인'];
                const borderStyle = sc === '미확인' ? `1.5px dashed ${stColor}` : `2px solid ${stColor}`;
                const opacity = sc === '미확인' ? '0.7' : '1';
                el.style.cssText = `background:${color};color:white;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;white-space:nowrap;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.25);border:${borderStyle};opacity:${opacity}`;
                const maxLen = map.getLevel() <= 3 ? 18 : 8;
                el.textContent = z.zone_name.length > maxLen ? z.zone_name.slice(0,maxLen)+'...' : z.zone_name;
                el.onclick = () => selectZone(z);
            }
            markers.push(new kakao.maps.CustomOverlay({ map, position: pos, content: el, yAnchor: 0.5 }));
        });
    }

    // === 폴리곤 렌더링 (뷰포트 + 캐시 기반) ===
    function renderPolygons() {
        polygons.forEach(p => p.setMap(null)); polygons = [];

        const level = map.getLevel();
        if (level > POLY_ZOOM_THRESHOLD) return; // 줌이 넓으면 폴리곤 안 그림

        // 현재 뷰포트 범위
        const b = map.getBounds();
        const sw = b.getSouthWest();
        const ne = b.getNorthEast();

        filteredZones.forEach(z => {
            // 뷰포트 밖의 구역은 건너뜀
            if (!z.center_lat || !z.center_lon) return;
            if (z.center_lat < sw.getLat() || z.center_lat > ne.getLat()) return;
            if (z.center_lon < sw.getLng() || z.center_lon > ne.getLng()) return;

            // 캐시에서 geometry 가져오기
            const geom = geometryCache.get(z.id);
            if (!geom || !geom.coordinates) return;

            const fillColor = getTypeColor(z.project_type);
            const sc = stageCategory(z.stage);
            const strokeColor = STAGE_COLORS[sc] || STAGE_COLORS['미확인'];
            const strokeWeight = STAGE_STROKE_WEIGHT[sc] || 1.5;
            const fillOpacity = sc === '미확인' ? 0.1 : 0.3;
            const strokeOpacity = sc === '미확인' ? 0.5 : 0.9;
            const strokeStyle = sc === '미확인' ? 'shortdash' : 'solid';
            geom.coordinates.forEach(ring => {
                const path = ring.map(c => new kakao.maps.LatLng(c[1], c[0]));
                const poly = new kakao.maps.Polygon({
                    map, path,
                    strokeWeight: strokeWeight,
                    strokeColor: strokeColor,
                    strokeOpacity: strokeOpacity,
                    strokeStyle: strokeStyle,
                    fillColor: fillColor,
                    fillOpacity: fillOpacity,
                });
                kakao.maps.event.addListener(poly, 'click', () => selectZone(z));
                kakao.maps.event.addListener(poly, 'mouseover', () => poly.setOptions({ fillOpacity: fillOpacity + 0.2, strokeWeight: strokeWeight + 1 }));
                kakao.maps.event.addListener(poly, 'mouseout', () => poly.setOptions({ fillOpacity: fillOpacity, strokeWeight: strokeWeight }));
                polygons.push(poly);
            });
        });
    }

    // === 목록 렌더링 ===
    function renderZoneList() {
        const list = document.getElementById('zoneList');
        if (!filteredZones.length) {
            list.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:12px">조건에 맞는 구역이 없습니다</div>';
            return;
        }
        // 최대 200건까지만 목록에 표시 (성능)
        const displayZones = filteredZones.slice(0, 200);
        const moreCount = filteredZones.length - 200;
        list.innerHTML = displayZones.map(z => {
            const sc = stageCategory(z.stage);
            return `<div class="zone-card ${selectedZone&&selectedZone.id===z.id?'selected':''}" onclick="selectZone(findZone(${z.id}))">
                <div class="zone-name">${z.zone_name}</div>
                <div class="zone-meta">
                    <span class="zone-badge type-${z.project_type||'기타'}">${z.project_type||'미분류'}</span>
                    <span class="zone-badge stage-${sc}">${sc}${z.stage && sc !== '미확인' ? ' ('+z.stage+')' : ''}</span>
                </div>
                <div class="zone-address">${z.district||''}${z.dong?' '+z.dong:''}</div>
            </div>`;
        }).join('');
        if (moreCount > 0) {
            list.innerHTML += `<div style="text-align:center;padding:12px;color:#94a3b8;font-size:11px">+ ${moreCount.toLocaleString()}개 더 (지도를 확대하거나 필터를 좁혀주세요)</div>`;
        }
    }

    function findZone(id) { return allZones.find(z => z.id === id); }

    async function selectZone(z) {
        if (!z) return; selectedZone = z;
        if (z.center_lat && z.center_lon) { map.setCenter(new kakao.maps.LatLng(z.center_lat, z.center_lon)); map.setLevel(4); }

        // 상세 정보가 없으면 API에서 가져오기 (minimal 모드로 로드했으므로)
        if (!z.developer && !z.source) {
            try {
                const resp = await fetch(`/api/propvalue/zones/${z.id}`);
                const data = await resp.json();
                if (data.success && data.zone) {
                    // allZones 배열의 해당 항목도 업데이트
                    Object.assign(z, data.zone);
                    // geometry도 캐시
                    if (data.zone.geometry) geometryCache.set(z.id, data.zone.geometry);
                }
            } catch(e) { console.error('selectZone detail fetch:', e); }
        }

        showDetail(z); renderZoneList();
        if (window.innerWidth <= 768) document.getElementById('sidePanel').classList.add('expanded');
    }

    function showDetail(z) {
        document.getElementById('detailTitle').textContent = z.zone_name;
        const sc = stageCategory(z.stage);
        const items = [
            ['종류', z.project_type || '-'],
            ['단계', sc !== '미확인' ? `${sc} (${z.stage})` : '미확인'],
            ['위치', `${z.city||''} ${z.district||''}${z.dong?' '+z.dong:''}`],
            ['면적', z.area_sqm ? `${Number(z.area_sqm).toLocaleString()}m2` : '-'],
            ['세대수', z.households ? `${z.households.toLocaleString()}세대` : '-'],
            ['시공사', z.developer || '-'],
            ['조합설립', z.union_approved || '-'], ['사업시행', z.biz_approved || '-'],
            ['관리처분', z.mgmt_approved || '-'], ['착공', z.construction_start || '-'],
        ];
        document.getElementById('detailGrid').innerHTML = items.map(([l,v]) =>
            `<div><div class="detail-label">${l}</div><div class="detail-value">${v}</div></div>`
        ).join('');
        document.getElementById('detailPanel').classList.add('show');
    }

    function closeDetail() { document.getElementById('detailPanel').classList.remove('show'); selectedZone = null; renderZoneList(); }
    function onMapIdle() { renderMarkers(false); scheduleGeometryFetch(); }
    function toggleLegend() { document.getElementById('legendPanel').classList.toggle('show'); }
    function goMyLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(function(pos) {
            map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
            map.setLevel(4);
        });
    }
    function togglePanel() { const p=document.getElementById('sidePanel'),b=document.getElementById('panelToggle'); if(p.style.display==='none'){p.style.display='flex';b.innerHTML='&#9654;';b.classList.remove('collapsed')}else{p.style.display='none';b.innerHTML='&#9664;';b.classList.add('collapsed')} }
    function closeMobilePanel() { document.getElementById('sidePanel').classList.remove('expanded'); }
    (function(){if(window.innerWidth>768)return;const p=document.getElementById('sidePanel');p.addEventListener('click',function(e){if(e.target===p||e.target.closest('.panel-header'))p.classList.toggle('expanded')})})();
    </script>
</body>
