<!DOCTYPE html>
<html><body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const s = canvas.width;
    // Background
    ctx.fillStyle = '#1A73E8';
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, s * 0.2);
    ctx.fill();
    // Text
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${s * 0.35}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('PT', s/2, s/2);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
// Download links
['c192','c512'].forEach(id => {
    const c = document.getElementById(id);
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = `icon-${c.width}.png`;
    a.textContent = `Download ${c.width}`;
    document.body.appendChild(a);
    document.body.appendChild(document.createElement('br'));
});
</script>
</body></html>
