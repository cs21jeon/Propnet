<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proptalk 웹</title>
    <link rel="icon" type="image/png" href="/proptalk/web/static/favicon.png?v=3">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .logo { font-size: 28px; font-weight: 700; color: #1A73E8; margin-bottom: 4px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 12px; }
        .desc { color: #999; font-size: 13px; margin-bottom: 32px; line-height: 1.6; }
        .features {
            text-align: left;
            margin-bottom: 32px;
            padding: 16px 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .features li {
            color: #555;
            font-size: 13px;
            margin-bottom: 6px;
            list-style: none;
            padding-left: 20px;
            position: relative;
        }
        .features li::before { content: "✓"; position: absolute; left: 0; color: #1A73E8; font-weight: 700; }
        .error { color: #dc3545; font-size: 13px; margin-bottom: 16px; display: none; }
        .google-btn-wrap { display: flex; justify-content: center; }
        .loading { display: none; color: #888; font-size: 14px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Proptalk Web</div>
        <p class="subtitle">세상 쉬운 업무 공유</p>
        <p class="desc">PC에서 Proptalk의 모든 기능을 사용하세요.</p>
        <ul class="features">
            <li>실시간 채팅 & 음성 메시지</li>
            <li>녹음 파일 Drag & Drop 업로드</li>
            <li>브라우저 즉석 녹음</li>
            <li>AI 음성 전사 & 요약</li>
            <li>키보드 단축키 지원</li>
        </ul>
        <div class="error" id="error"></div>
        <div class="google-btn-wrap">
            <div id="g_id_onload"
                 data-client_id="{{ google_client_id }}"
                 data-callback="onGoogleSignIn"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-size="large"
                 data-theme="outline"
                 data-text="signin_with"
                 data-shape="rectangular"
                 data-logo_alignment="left"
                 data-width="320">
            </div>
        </div>
        <div class="loading" id="loading">로그인 중...</div>
    </div>
    <script>
        // 이미 로그인된 경우 바로 이동
        if (localStorage.getItem('proptalk_token')) {
            window.location.href = '/proptalk/web/';
        }

        async function onGoogleSignIn(response) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            try {
                const res = await fetch('/voiceroom/api/auth/google', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id_token: response.credential})
                });
                const data = await res.json();
                if (res.ok && (data.access_token || data.token)) {
                    localStorage.setItem('proptalk_token', data.access_token || data.token);
                    if (data.refresh_token) {
                        localStorage.setItem('proptalk_refresh_token', data.refresh_token);
                    }
                    if (data.user) {
                        localStorage.setItem('proptalk_user', JSON.stringify(data.user));
                    }
                    window.location.href = '/proptalk/web/';
                } else {
                    showError(data.error || '로그인 실패');
                }
            } catch(e) {
                showError('연결 오류: ' + e.message);
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    </script>
</body>
</html>
